<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ASU - Rapport de vol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f3b5b 0, #050814 55%, #020308 100%);
      color: #f5f7fb;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 900px;
      background: rgba(5, 10, 25, 0.92);
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(120, 180, 255, 0.25);
      padding: 18px 18px 26px;
      backdrop-filter: blur(10px);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(120, 180, 255, 0.25);
    }
    .title-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    h1 {
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 0.8rem;
      color: #9fb4d9;
    }
    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(120, 180, 255, 0.5);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #cfe2ff;
      background: linear-gradient(135deg, rgba(40, 90, 160, 0.8), rgba(10, 25, 60, 0.9));
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }
    .section {
      background: radial-gradient(circle at top left, rgba(60, 110, 190, 0.18), rgba(10, 15, 35, 0.95));
      border-radius: 14px;
      padding: 12px 12px 14px;
      border: 1px solid rgba(120, 180, 255, 0.18);
    }
    .section-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #cfe2ff;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    label {
      font-size: 0.78rem;
      color: #cfd8f5;
    }
    input, textarea, select {
      background: rgba(5, 10, 25, 0.9);
      border-radius: 9px;
      border: 1px solid rgba(120, 180, 255, 0.35);
      padding: 7px 9px;
      color: #f5f7fb;
      font-size: 0.8rem;
      outline: none;
      width: 100%;
    }
    textarea {
      min-height: 70px;
      resize: vertical;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(10, 20, 45, 0.95);
      border: 1px solid rgba(120, 180, 255, 0.35);
      font-size: 0.72rem;
      cursor: pointer;
      user-select: none;
    }
    .chip input {
      accent-color: #4ea3ff;
    }
    .footer-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 6px;
    }
    .btn-primary {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #2f7bff, #00c6ff);
      color: #f5f7fb;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 150, 255, 0.45);
    }
    .btn-secondary {
      width: 100%;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.8rem;
      border: 1px solid rgba(120, 180, 255, 0.4);
      background: rgba(5, 10, 25, 0.9);
      color: #cfe2ff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-block">
        <h1>ASU - Rapport de vol</h1>
        <div class="subtitle">Unité aérienne | Modèle opérationnel complet</div>
      </div>
      <div class="badge">CARLES37000 • LIVE OPS</div>
    </header>

    <form id="asuForm">
            <!-- SECTION 1 -->
      <div class="section">
        <div class="section-title">Informations vol</div>
        <div class="grid-2">
          <div class="field">
            <label>Numéro de vol</label>
            <input id="vol">
          </div>
          <div class="field">
            <label>Type de mission</label>
            <select id="mission">
              <option>Surveillance</option>
              <option>Appui au sol</option>
              <option>Poursuite</option>
              <option>Reconnaissance</option>
              <option>Transport</option>
              <option>Évacuation</option>
            </select>
          </div>
        </div>

        <div class="grid-2" style="margin-top:8px;">
          <div class="field">
            <label>Zone d’opération</label>
            <input id="zone">
          </div>
          <div class="field">
            <label>Type d’appareil</label>
            <input id="appareil">
          </div>
        </div>
      </div>

      <!-- SECTION 2 -->
      <div class="section">
        <div class="section-title">Équipage</div>
        <div class="grid-3">
          <div class="field">
            <label>Pilote</label>
            <input id="pilote">
          </div>
          <div class="field">
            <label>Co-pilote</label>
            <input id="copilote">
          </div>
          <div class="field">
            <label>Tactique</label>
            <input id="tactique">
          </div>
        </div>
      </div>

      <!-- SECTION 3 -->
      <div class="section">
        <div class="section-title">Déroulement du vol</div>
        <div class="grid-2">
          <div class="field">
            <label>Décollage</label>
            <input type="datetime-local" id="decollage">
          </div>
          <div class="field">
            <label>Atterrissage</label>
            <input type="datetime-local" id="atterrissage">
          </div>
        </div>

        <div class="field" style="margin-top:8px;">
          <label>Résumé du vol</label>
          <textarea id="resume"></textarea>
        </div>
      </div>

      <!-- SECTION 4 -->
      <div class="section">
        <div class="section-title">Météo</div>
        <div class="grid-2">
          <div class="field">
            <label>Vent</label>
            <input id="vent">
          </div>
          <div class="field">
            <label>QNH</label>
            <input id="qnh">
          </div>
        </div>

        <div class="chips">
          <label class="chip"><input type="checkbox" id="meteoVentFaible"> Vent faible</label>
          <label class="chip"><input type="checkbox" id="meteoVentModere"> Vent modéré</label>
          <label class="chip"><input type="checkbox" id="meteoVentFort"> Vent fort</label>
          <label class="chip"><input type="checkbox" id="meteoVisiBonne"> Visibilité bonne</label>
          <label class="chip"><input type="checkbox" id="meteoVisiMoy"> Visibilité moyenne</label>
          <label class="chip"><input type="checkbox" id="meteoVisiMauvaise"> Visibilité mauvaise</label>
          <label class="chip"><input type="checkbox" id="meteoCielDegage"> Ciel dégagé</label>
          <label class="chip"><input type="checkbox" id="meteoNuageux"> Nuageux</label>
          <label class="chip"><input type="checkbox" id="meteoPluie"> Pluie</label>
          <label class="chip"><input type="checkbox" id="meteoOrage"> Orage</label>
          <label class="chip"><input type="checkbox" id="meteoJour"> Jour</label>
          <label class="chip"><input type="checkbox" id="meteoNuit"> Nuit</label>
        </div>
      </div>

      <!-- SECTION 5 -->
      <div class="section">
        <div class="section-title">Carburant</div>
        <div class="grid-3">
          <div class="field">
            <label>Carburant départ</label>
            <input id="carbDepart">
          </div>
          <div class="field">
            <label>Carburant arrivée</label>
            <input id="carbArrivee">
          </div>
          <div class="field">
            <label>Consommation</label>
            <input id="carbConso">
          </div>
        </div>

        <div class="chips">
          <label class="chip"><input type="checkbox" id="pleinEffectue"> Plein effectué</label>
          <label class="chip"><input type="checkbox" id="pleinNonEffectue"> Plein non effectué</label>
          <label class="chip"><input type="checkbox" id="carbSuffisant"> Carburant suffisant</label>
          <label class="chip"><input type="checkbox" id="carbLimite"> Carburant limite</label>
          <label class="chip"><input type="checkbox" id="consoNormale"> Conso normale</label>
          <label class="chip"><input type="checkbox" id="consoElevee"> Conso élevée</label>
        </div>
      </div>

      <!-- SECTION 6 -->
      <div class="section">
        <div class="section-title">Avaries / anomalies</div>
        <div class="chips">
          <label class="chip"><input type="checkbox" id="avarieRAS"> RAS</label>
          <label class="chip"><input type="checkbox" id="avarieRadio"> Radio</label>
          <label class="chip"><input type="checkbox" id="avarieFLIR"> FLIR</label>
          <label class="chip"><input type="checkbox" id="avarieRotor"> Rotor</label>
          <label class="chip"><input type="checkbox" id="avarieMoteur"> Moteur</label>
          <label class="chip"><input type="checkbox" id="avarieInstruments"> Instruments</label>
          <label class="chip"><input type="checkbox" id="avarieVibrations"> Vibrations</label>
          <label class="chip"><input type="checkbox" id="avarieAlerte"> Alerte tableau</label>
        </div>

        <div class="field" style="margin-top:8px;">
          <label>Détails</label>
          <textarea id="avarieDetails"></textarea>
        </div>
      </div>

      <!-- SECTION 7 -->
      <div class="section">
        <div class="section-title">Conditions & matériel</div>
        <div class="chips">
          <label class="chip"><input type="checkbox" id="condVFR"> VFR</label>
          <label class="chip"><input type="checkbox" id="condIFR"> IFR</label>
          <label class="chip"><input type="checkbox" id="turbFaible"> Turb faible</label>
          <label class="chip"><input type="checkbox" id="turbModerees"> Turb modérées</label>
          <label class="chip"><input type="checkbox" id="turbFortes"> Turb fortes</label>
        </div>

        <div class="chips" style="margin-top:6px;">
          <label class="chip"><input type="checkbox" id="matFLIR"> FLIR</label>
          <label class="chip"><input type="checkbox" id="matProjecteur"> Projecteur</label>
          <label class="chip"><input type="checkbox" id="matRadioLP"> Radio LP</label>
          <label class="chip"><input type="checkbox" id="matSecours"> Secours</label>
          <label class="chip"><input type="checkbox" id="matArmement"> Armement</label>
          <label class="chip"><input type="checkbox" id="matGPS"> GPS</label>
        </div>
      </div>

      <!-- SECTION 8 -->
      <div class="section">
        <div class="section-title">Observations & conclusion</div>

        <div class="chips">
          <label class="chip"><input type="checkbox" id="resMissionOK"> Mission OK</label>
          <label class="chip"><input type="checkbox" id="resMissionPartielle"> Partielle</label>
          <label class="chip"><input type="checkbox" id="resMissionAnnulee"> Annulée</label>
          <label class="chip"><input type="checkbox" id="resInterSol"> Intervention sol</label>
          <label class="chip"><input type="checkbox" id="resAucunIncident"> Aucun incident</label>
        </div>

        <div class="field" style="margin-top:8px;">
          <label>Observations tactiques</label>
          <textarea id="obsTactiques"></textarea>
        </div>

        <div class="grid-2" style="margin-top:8px;">
          <div class="field">
            <label>Recommandations</label>
            <textarea id="recommandations"></textarea>
          </div>
          <div class="field">
            <label>Signature</label>
            <input id="signature">
          </div>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="footer-actions">
        <button type="button" class="btn-primary" onclick="envoyerRapport(); genererEtEnvoyerPDF();">
          Envoyer le rapport + PDF
        </button>
        <button type="reset" class="btn-secondary">Réinitialiser</button>
      </div>

    </form>
  </div>
<script>
const webhookURL = "https://discord.com/api/webhooks/1517134256311238859/taFSoamWWzAzxH7oGaFPyeNoku-BBN4D2BiGWx0SEHb17z5J_D1sDlUkT09r7xnZRUdT";

function envoyerRapport() {

  const get = id => document.getElementById(id)?.value || "";
  const chk = ids => ids
    .filter(id => document.getElementById(id)?.checked)
    .map(id => document.getElementById(id).parentElement.innerText.trim())
    .join(", ") || "Aucun";

  const embed = {
    title: "📡 Rapport ASU – CARLES37000",
    color: 3447003,
    fields: [
      { name: "Numéro de vol", value: get("vol") },
      { name: "Mission", value: get("mission") },
      { name: "Zone", value: get("zone") },
      { name: "Appareil", value: get("appareil") },

      { name: "Équipage", value:
        `Pilote : ${get("pilote")}\nCo-pilote : ${get("copilote")}\nTactique : ${get("tactique")}` },

      { name: "Déroulement", value:
        `Décollage : ${get("decollage")}\nAtterrissage : ${get("atterrissage")}` },

      { name: "Résumé du vol", value: get("resume") || "Aucun résumé" },

      { name: "Météo", value:
        `Vent : ${get("vent")}\nQNH : ${get("qnh")}\nConditions : ${
          chk([
            "meteoVentFaible","meteoVentModere","meteoVentFort",
            "meteoVisiBonne","meteoVisiMoy","meteoVisiMauvaise",
            "meteoCielDegage","meteoNuageux","meteoPluie","meteoOrage",
            "meteoJour","meteoNuit"
          ])
        }` },

      { name: "Carburant", value:
        `Départ : ${get("carbDepart")} L\nArrivée : ${get("carbArrivee")} L\nConso : ${get("carbConso")} L\nOptions : ${
          chk([
            "pleinEffectue","pleinNonEffectue","carbSuffisant",
            "carbLimite","consoNormale","consoElevee"
          ])
        }` },

      { name: "Avaries", value:
        `${chk([
          "avarieRAS","avarieRadio","avarieFLIR","avarieRotor",
          "avarieMoteur","avarieInstruments","avarieVibrations","avarieAlerte"
        ])}\n\nDétails : ${get("avarieDetails") || "RAS"}` },

      { name: "Conditions de vol", value:
        chk(["condVFR","condIFR","turbFaible","turbModerees","turbFortes"]) },

      { name: "Matériel embarqué", value:
        chk(["matFLIR","matProjecteur","matRadioLP","matSecours","matArmement","matGPS"]) },

      { name: "Résultat mission", value:
        chk(["resMissionOK","resMissionPartielle","resMissionAnnulee","resInterSol","resAucunIncident"]) },

      { name: "Observations tactiques", value: get("obsTactiques") || "Aucune" },
      { name: "Recommandations", value: get("recommandations") || "Aucune" },
      { name: "Signature", value: get("signature") || "Non signé" }
    ]
  };

  fetch(webhookURL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ embeds: [embed] })
  });
}
</script>
<!-- Librairie PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
async function genererEtEnvoyerPDF() {

  // On capture TOUTE la page (important)
  const element = document.body;

  const opt = {
    margin: 0.5,
    filename: "rapport_asu.pdf",
    image: { type: "jpeg", quality: 1 },
    html2canvas: { scale: 3, useCORS: true },
    jsPDF: { unit: "cm", format: "a4", orientation: "portrait" }
  };

  // Génération du PDF
  const pdfBlob = await html2pdf().set(opt).from(element).outputPdf("blob");

  // Préparation pour Discord
  const formData = new FormData();
  formData.append("file", pdfBlob, "rapport_asu.pdf");

  const payload = {
    embeds: [
      {
        title: "📄 Rapport ASU – PDF généré",
        description: "Le rapport complet est disponible en pièce jointe.",
        color: 3447003
      }
    ]
  };

  formData.append("payload_json", JSON.stringify(payload));

  // Envoi au webhook
  await fetch("https://discord.com/api/webhooks/1517134256311238859/taFSoamWWzAzxH7oGaFPyeNoku-BBN4D2BiGWx0SEHb17z5J_D1sDlUkT09r7xnZRUdT", {
    method: "POST",
    body: formData
  });

  alert("PDF généré et envoyé dans Discord !");
}
</script>

</body>
</html>
